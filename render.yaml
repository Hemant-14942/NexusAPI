databases:
  - name: nexusapi-db
    databaseName: nexusapi
    plan: free

services:
  # Redis
  - type: redis
    name: nexusapi-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  # API Web Service
  - type: web
    name: nexusapi-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexusapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexusapi-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: APP_ENV
        value: production
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"

  # ARQ Background Worker
  - type: worker
    name: nexusapi-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerCommand: sh -c 'if [[ "$DATABASE_URL" == postgresql://* ]]; then export DATABASE_URL="postgresql+asyncpg://${DATABASE_URL#postgresql://}"; fi; arq app.worker.WorkerSettings'
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nexusapi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: nexusapi-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: nexusapi-api
          envVarKey: JWT_SECRET_KEY
      - key: APP_ENV
        value: production
